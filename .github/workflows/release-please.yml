name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}

    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          release-type: rust

  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
            binary: san
          - os: macos-15-intel
            target: x86_64-apple-darwin
            archive: tar.gz
            binary: san
          - os: macos-14
            target: aarch64-apple-darwin
            archive: tar.gz
            binary: san
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            binary: san.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache target directory
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-target-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Build CLI
        run: cargo build --release --locked --bin san --target ${{ matrix.target }}

      - name: Package tarball
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist package
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "package/${{ matrix.binary }}"
          tar -C package -czf "dist/san-${{ needs.release-please.outputs.tag_name }}-${{ matrix.target }}.tar.gz" "${{ matrix.binary }}"

      - name: Package zip
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist, package | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary }}" "package/${{ matrix.binary }}"
          Compress-Archive -Path "package/${{ matrix.binary }}" -DestinationPath "dist/san-${{ needs.release-please.outputs.tag_name }}-${{ matrix.target }}.zip" -Force

      - name: Upload packaged CLI
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.target }}
          path: dist/*

  publish:
    name: Upload release assets
    runs-on: ubuntu-latest
    needs:
      - release-please
      - build
    if: ${{ needs.release-please.outputs.release_created == 'true' }}

    steps:
      - name: Download packaged CLIs
        uses: actions/download-artifact@v4
        with:
          pattern: cli-*
          merge-multiple: true
          path: dist

      - name: Create checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          shasum -a 256 * > "san-${{ needs.release-please.outputs.tag_name }}-sha256.txt"

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh release upload "${{ needs.release-please.outputs.tag_name }}" dist/* \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber
